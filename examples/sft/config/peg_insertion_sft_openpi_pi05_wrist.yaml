defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: ${oc.env:SFT_COMPONENT_PLACEMENT,0-3}

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "peg_insertion_sft_wrist"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 30000
  val_check_interval: -1
  save_interval: 2000

  resume_dir: null
  ckpt_path: null

data:
  train_data_paths: "/opt/yingxi/RLinf_RoboFAPE/run_train/peginsertion_maniskill_pi0.5/data/peg_insertion_vertical_controller_3200"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 32
  seed: 0

  model:
    precision: null
    model_path: "/opt/kairan/models/RLinf-Pi05-ManiSkill-25Main-SFT"
    model_type: "openpi"
    num_action_chunks: 10
    action_dim: 7
    add_value_head: False
    openpi:
      config_name: "pi05_maniskill_peg_insertion_wrist"
      num_images_in_input: 2
      train_expert_only: True
      detach_critic_input: True

  optim:
    lr: 2.5e-6
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 30000
    lr_warmup_steps: 500
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-7

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
