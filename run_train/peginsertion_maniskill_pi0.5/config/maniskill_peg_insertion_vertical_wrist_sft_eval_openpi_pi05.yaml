defaults:
  - env/maniskill_peg_insertion_vertical@env.train
  - env/maniskill_peg_insertion_vertical@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "peginsertion_maniskill_pi0.5_sft_eval_wrist"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 1
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

env:
  group_name: "EnvGroup"
  train:
    rollout_epoch: 1
    total_num_envs: 1
    auto_reset: True
    use_fixed_reset_state_ids: False
    use_wrist_image: True
    max_episode_steps: 600
    max_steps_per_rollout_epoch: 600
    reset_options:
      randomize_initial_poses: True
  eval:
    rollout_epoch: 1
    total_num_envs: 25
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: False
    use_wrist_image: True
    group_size: ${algorithm.group_size}
    is_eval: True
    # Real-time chunking: predict the full 10-step chunk each query but execute
    # only the first k actions before re-querying, closing the within-chunk
    # open loop. temporal_ensemble_weight > 0 time-weighted-blends overlapping
    # predictions (ACT) for smoothness. A/B against k=10, m=0 for the baseline.
    execute_action_chunks: 5
    temporal_ensemble_weight: 0.01
    reset_options:
      randomize_initial_poses: False
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: ${oc.env:MODEL_PATH,/path/to/peg-insertion-sft/checkpoints/global_step_x/actor}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 32
  seed: 0
  enable_offload: False
  model:
    model_path: ${oc.env:MODEL_PATH,/path/to/peg-insertion-sft/checkpoints/global_step_x/actor}
    model_type: "openpi"
    add_value_head: False
    num_action_chunks: 10
    action_dim: 7
    num_steps: 5
    openpi:
      config_name: "pi05_maniskill_peg_insertion_wrist"
      num_images_in_input: 2
      action_horizon: 10
      action_chunk: ${..num_action_chunks}
      action_env_dim: ${..action_dim}
      train_expert_only: True
      detach_critic_input: True
    policy_setup: panda-ee-target-dpose
  optim:
    lr: 2.5e-6
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
